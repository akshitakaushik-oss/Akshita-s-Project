<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IIM Rohtak — Tutor Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #232220;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #f0ece3;
    --muted: #8a8680;
    --green: #4caf88;
    --amber: #d4943a;
    --red: #c45c4c;
    --green-bg: rgba(76,175,136,0.12);
    --amber-bg: rgba(212,148,58,0.12);
    --red-bg: rgba(196,92,76,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .logo-block {}
  .logo-tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .header-stats {
    display: flex;
    gap: 2rem;
  }
  .h-stat { text-align: right; }
  .h-stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
  }
  .h-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* FILTER BAR */
  .filter-bar {
    max-width: 1100px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); font-weight: 500; }

  /* MAIN */
  .main {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 2rem 4rem;
  }

  /* TUTOR SECTION */
  .tutor-block {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tutor-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    border-bottom: none;
  }
  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tutor-info { flex: 1; }
  .tutor-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .tutor-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tutor-avg {
    text-align: right;
  }
  .avg-val {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .avg-label { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }

  /* RATING STAR BAR */
  .rating-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .star { font-size: 12px; }
  .star.filled { color: var(--gold); }
  .star.half { color: var(--gold); opacity: 0.5; }
  .star.empty { color: var(--muted); opacity: 0.3; }

  /* SESSIONS TABLE */
  .sessions-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }
  .session-row {
    display: grid;
    grid-template-columns: 1fr 90px 80px 80px 90px;
    align-items: center;
    padding: 12px 1.5rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    transition: background 0.15s;
  }
  .session-row:last-child { border-bottom: none; }
  .session-row:hover { background: var(--surface2); }
  .session-row.header-row {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .session-row.header-row:hover { background: rgba(255,255,255,0.02); }
  .s-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .s-date { font-size: 12px; color: var(--muted); }
  .s-rating-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Playfair Display', serif;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red   { background: var(--red-bg);   color: var(--red); }
  .s-num { font-size: 12px; color: var(--muted); }
  .s-below { font-size: 12px; }
  .below-ok   { color: var(--green); }
  .below-warn { color: var(--amber); }
  .below-bad  { color: var(--red); }

  /* SATISFACTION MINI BAR */
  .sat-bar { display: flex; align-items: center; gap: 6px; }
  .sat-track { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .sat-fill { height: 100%; border-radius: 2px; }
  .sat-pct { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

  /* SECTION DIVIDER */
  .section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
    margin-top: 2.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* RESPONSIVE */
  @media (max-width: 680px) {
    .session-row { grid-template-columns: 1fr 70px 60px; }
    .session-row > *:nth-child(4),
    .session-row > *:nth-child(5) { display: none; }
    .header-stats { gap: 1rem; }
    .logo-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-tag">IIM Rohtak &mdash; Session Feedback Report</div>
      <div class="logo-title">Tutor-wise Feedback</div>
      <div class="logo-sub">March – April 2026 &nbsp;·&nbsp; AIPPMGM &amp; ADMAIS Batches</div>
    </div>
    <div class="header-stats">
      <div class="h-stat">
        <div class="h-stat-val" id="stat-tutors">8</div>
        <div class="h-stat-label">Tutors</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" id="stat-sessions">11</div>
        <div class="h-stat-label">Sessions</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" id="stat-avg" style="color:var(--green);">4.45</div>
        <div class="h-stat-label">Avg Rating</div>
      </div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Batch:</span>
  <button class="filter-btn active" data-batch="all">All</button>
  <button class="filter-btn" data-batch="AIPPMGM">AIPPMGM</button>
  <button class="filter-btn" data-batch="ADMAIS">ADMAIS</button>
</div>

<div class="main" id="main"></div>

<script>
const sessions = [
  { batch:"AIPPMGM", tutor:"Dr. Rubina Chakma",       session:"Introduction to Case-Based Teaching Pedagogy and Product Marketing", attendees:122, rating:4.6, responses:80,  below4:10, date:"8 Mar 2026" },
  { batch:"ADMAIS",  tutor:"Dr. Ankit Kesharwani",     session:"Digital Marketing Fundamentals",                                      attendees:53,  rating:4.3, responses:92,  below4:10, date:"8 Mar 2026" },
  { batch:"AIPPMGM", tutor:"Prof. Shivendra K Pandey", session:"Positioning and Branding",                                            attendees:138, rating:4.62,responses:43,  below4:4,  date:"15 Mar 2026" },
  { batch:"ADMAIS",  tutor:"Dr. Ankit Kesharwani",     session:"Web Analytics Primer",                                                attendees:56,  rating:4.0, responses:43,  below4:10, date:"15 Mar 2026" },
  { batch:"AIPPMGM", tutor:"Dr. Archit V. Tapar",      session:"Fundamentals of Product Thinking",                                    attendees:116, rating:4.8, responses:63,  below4:0,  date:"22 Mar 2026" },
  { batch:"ADMAIS",  tutor:"Prof. Shivendra K Pandey", session:"Knowing Your (Digital) Customer",                                     attendees:56,  rating:4.0, responses:43,  below4:10, date:"22 Mar 2026" },
  { batch:"AIPPMGM", tutor:"Dr. Rubina Chakma",        session:"NPD and PLC Management in the AI Era",                                attendees:139, rating:4.5, responses:88,  below4:10, date:"29 Mar 2026" },
  { batch:"ADMAIS",  tutor:"Prof. Sumeet Sharma",       session:"Seeing the Story in Data: Visual Analytics & Dashboards",            attendees:62,  rating:4.6, responses:48,  below4:8,  date:"29 Mar 2026" },
  { batch:"ADMAIS",  tutor:"Dr. Ankit Kesharwani",     session:"Winning the SERP Game: SEO Tools & Techniques",                       attendees:65,  rating:3.9, responses:45,  below4:15, date:"5 Apr 2026" },
  { batch:"AIPPMGM", tutor:"Dr. Sridhar Srinivasan",   session:"Wireframes and User Flows",                                           attendees:123, rating:4.5, responses:64,  below4:1,  date:"12 Apr 2026" },
  { batch:"ADMAIS",  tutor:"Mr. Lalit Kataria",         session:"Generative AI and SEO Strategy",                                     attendees:62,  rating:4.6, responses:41,  below4:2,  date:"12 Apr 2026" },
];

const avatarPalettes = [
  {bg:"#2a1f0a",fg:"#c9a84c"},
  {bg:"#0d1f18",fg:"#4caf88"},
  {bg:"#1a0d1a",fg:"#b07ec8"},
  {bg:"#0d1829",fg:"#5a9ed4"},
  {bg:"#1f0e0d",fg:"#c45c4c"},
  {bg:"#141a0d",fg:"#8ab84c"},
  {bg:"#1a160d",fg:"#d4943a"},
  {bg:"#0d1a1f",fg:"#4caaaf"},
];

function initials(name) {
  return name.replace(/^(Dr\.|Prof\.|Mr\.|Ms\.)\s*/i,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function pillClass(r) {
  if (r >= 4.5) return 'pill-green';
  if (r >= 4.0) return 'pill-amber';
  return 'pill-red';
}

function belowClass(pct) {
  if (pct <= 5)  return 'below-ok';
  if (pct <= 15) return 'below-warn';
  return 'below-bad';
}

function satColor(pct) {
  if (pct >= 90) return '#4caf88';
  if (pct >= 80) return '#d4943a';
  return '#c45c4c';
}

function stars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) html += '<span class="star filled">★</span>';
    else if (rating >= i - 0.5) html += '<span class="star half">★</span>';
    else html += '<span class="star empty">★</span>';
  }
  return html;
}

function avgRatingColor(r) {
  if (r >= 4.5) return 'var(--green)';
  if (r >= 4.0) return 'var(--amber)';
  return 'var(--red)';
}

function render(batchFilter) {
  const filtered = batchFilter === 'all' ? sessions : sessions.filter(s => s.batch === batchFilter);

  // Group by tutor
  const tutorMap = {};
  filtered.forEach(s => {
    if (!tutorMap[s.tutor]) tutorMap[s.tutor] = { tutor: s.tutor, batches: new Set(), sessions: [] };
    tutorMap[s.tutor].batches.add(s.batch);
    tutorMap[s.tutor].sessions.push(s);
  });

  const tutors = Object.values(tutorMap).sort((a,b) => {
    const avgA = a.sessions.reduce((x,s)=>x+s.rating,0)/a.sessions.length;
    const avgB = b.sessions.reduce((x,s)=>x+s.rating,0)/b.sessions.length;
    return avgB - avgA;
  });

  // Stats
  const totalSessions = filtered.length;
  const totalTutors = tutors.length;
  const overallAvg = filtered.length ? (filtered.reduce((x,s)=>x+s.rating,0)/filtered.length).toFixed(2) : '—';
  document.getElementById('stat-tutors').textContent = totalTutors;
  document.getElementById('stat-sessions').textContent = totalSessions;
  const avgEl = document.getElementById('stat-avg');
  avgEl.textContent = overallAvg;
  const avgNum = parseFloat(overallAvg);
  avgEl.style.color = avgNum >= 4.5 ? 'var(--green)' : avgNum >= 4.0 ? 'var(--amber)' : 'var(--red)';

  let html = '';
  tutors.forEach((t, i) => {
    const pal = avatarPalettes[i % avatarPalettes.length];
    const avg = (t.sessions.reduce((x,s)=>x+s.rating,0)/t.sessions.length);
    const avgStr = avg.toFixed(2);
    const totalResp = t.sessions.reduce((x,s)=>x+s.responses,0);
    const totalBelow = t.sessions.reduce((x,s)=>x+s.below4,0);
    const satPct = totalResp > 0 ? Math.round((1 - totalBelow/totalResp)*100) : 0;
    const batchStr = Array.from(t.batches).join(' · ');

    html += `<div class="tutor-block" style="animation-delay:${i*0.07}s">
      <div class="tutor-header">
        <div class="avatar" style="background:${pal.bg};color:${pal.fg};">${initials(t.tutor)}</div>
        <div class="tutor-info">
          <div class="tutor-name">${t.tutor}</div>
          <div class="tutor-meta">${batchStr} &nbsp;·&nbsp; ${t.sessions.length} session${t.sessions.length > 1 ? 's' : ''} &nbsp;·&nbsp; ${totalResp} total responses</div>
        </div>
        <div class="tutor-avg">
          <div class="avg-val" style="color:${avgRatingColor(avg)}">${avgStr}</div>
          <div class="rating-bar" style="justify-content:flex-end;">${stars(avg)}</div>
          <div class="avg-label">avg rating</div>
        </div>
      </div>
      <div class="sessions-wrap">
        <div class="session-row header-row">
          <span>Session</span>
          <span>Date</span>
          <span style="text-align:center;">Rating</span>
          <span style="text-align:center;">Responses</span>
          <span>Satisfaction</span>
        </div>`;

    t.sessions.forEach(s => {
      const sp = totalResp > 0 ? Math.round((1 - s.below4/s.responses)*100) : 0;
      const belowPct = s.responses > 0 ? Math.round(s.below4/s.responses*100) : 0;
      html += `<div class="session-row">
        <span class="s-name">${s.session}</span>
        <span class="s-date">${s.date}</span>
        <span style="text-align:center;"><span class="s-rating-pill ${pillClass(s.rating)}">${s.rating.toFixed(1)}</span></span>
        <span class="s-num" style="text-align:center;">${s.responses} <span class="${belowClass(belowPct)}" style="font-size:11px;">(${s.below4} &lt;4)</span></span>
        <span class="sat-bar">
          <span class="sat-track"><span class="sat-fill" style="width:${sp}%;background:${satColor(sp)};"></span></span>
          <span class="sat-pct">${sp}%</span>
        </span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('main').innerHTML = html;
}

render('all');

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.batch);
  });
});
</script>
</body>
</html>
